name: Deploy Proyectos MCE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy al hosting
    if: ${{ secrets.FTP_SERVER != '' && secrets.FTP_USERNAME != '' && secrets.FTP_PASSWORD != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FTP_PORT: ${{ secrets.FTP_PORT || '21' }}
      FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
      FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR || './' }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      - name: Subir archivos al hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ${{ env.FTP_PROTOCOL }}
          server-dir: ${{ env.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.ftp-deploy-sync-state.json
            includes/secrets.php
            includes/secrets.php.example
            *.sql
            **/*.sql
